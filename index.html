<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Consulta Infracciones DGT</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --card: rgba(255,255,255,0.96);
      --card-soft: rgba(248,250,252,0.9);
      --text: #0f172a;
      --muted: #475569;
      --border: #cbd5e1;
      --primary: #1d4ed8;
      --primary-strong: #1e40af;
      --primary-soft: #dbeafe;
      --warning-bg: #fef3c7;
      --warning-border: #f59e0b;
      --danger-bg: #fee2e2;
      --danger-border: #ef4444;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.22), transparent 35%),
        linear-gradient(180deg, var(--bg) 0%, #1e293b 100%);
      min-height: 100vh;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .hero {
      color: white;
      padding: 8px 4px 16px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.78);
      font-size: 0.98rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .bloque {
      background: var(--card-soft);
      border: 1px solid #e2e8f0;
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .bloque strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #1e293b;
      letter-spacing: 0.2px;
    }

    .fila-botones {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 999px;
      padding: 11px 14px;
      font-size: 0.94rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      min-height: 44px;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    button.activo {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 8px 18px rgba(29, 78, 216, 0.28);
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 15px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      outline: none;
      min-height: 48px;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29,78,216,0.12);
    }

    .acciones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
    }

    .acciones button {
      border-radius: 14px;
      min-height: 48px;
      font-size: 1rem;
    }

    .acciones button:first-child {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .acciones button:first-child:hover {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .resultado {
      background: white;
      border: 1px solid #dbe4ee;
      border-radius: 20px;
      padding: 16px;
      min-height: 120px;
      white-space: normal;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .titulo-resultado {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111827;
      word-break: break-word;
    }

    .resultado div {
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .alerta {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .alerta-penal {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: #991b1b;
    }

    .alerta-inmo {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      color: #92400e;
    }

    .secundario {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.45;
    }

    .oculto { display: none; }

    hr {
      border: 0;
      border-top: 1px solid #e2e8f0;
      margin: 14px 0;
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .panel { padding: 12px; border-radius: 20px; }
      .bloque { padding: 12px; border-radius: 16px; }
      .fila-botones { gap: 7px; }
      .fila-botones button { flex: 1 1 calc(50% - 7px); }
      .acciones { grid-template-columns: 1fr; }
      .resultado { padding: 14px; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>Modo Patrulla DGT</h1>
      <p>Consulta rápida de infracciones con filtro por materia, vehículo y situación.</p>
    </div>

    <div class="panel">
      <div class="bloque">
        <strong>Materia</strong>
        <div class="fila-botones" id="botonesMateria">
          <button type="button" onclick="seleccionar('materia','SEGURO',this)">SEGURO</button>
          <button type="button" onclick="seleccionar('materia','PERMISO',this)">PERMISO</button>
          <button type="button" onclick="seleccionar('materia','DROGAS',this)">DROGAS</button>
          <button type="button" onclick="seleccionar('materia','ALCOHOL',this)">ALCOHOL</button>
        </div>
      </div>

      <div class="bloque">
        <strong>Vehículo</strong>
        <div class="fila-botones" id="botonesVehiculo">
          <button type="button" onclick="seleccionar('vehiculo','TURISMO',this)">TURISMO</button>
          <button type="button" onclick="seleccionar('vehiculo','MOTOCICLETA',this)">MOTOCICLETA</button>
          <button type="button" onclick="seleccionar('vehiculo','CICLOMOTOR',this)">CICLOMOTOR</button>
          <button type="button" onclick="seleccionar('vehiculo','3ª CATEGORÍA',this)">3ª CATEGORÍA</button>
        </div>
      </div>

      <div class="bloque">
        <strong>Situación</strong>
        <div class="fila-botones" id="botonesSituacion">
          <button type="button" onclick="seleccionar('situacion','CIRCULANDO',this)">CIRCULANDO</button>
          <button type="button" onclick="seleccionar('situacion','NO CIRCULANDO',this)">NO CIRCULANDO</button>
        </div>
      </div>

      <div class="bloque" id="bloqueGrupoAlcohol">
        <strong>Grupo alcohol</strong>
        <div class="fila-botones" id="botonesGrupoAlcohol">
          <button type="button" onclick="seleccionar('grupoAlcohol','GENERAL',this)">GENERAL</button>
          <button type="button" onclick="seleccionar('grupoAlcohol','ESPECIAL',this)">NÓVEL / PROF.</button>
          <button type="button" onclick="seleccionar('grupoAlcohol','REINCIDENTE',this)">REINCIDENTE</button>
        </div>
      </div>

      <div class="bloque input-wrap">
        <strong>Descripción breve opcional</strong>
        <input type="text" id="texto" placeholder="Ej: sin seguro turismo, alcohol 0.66, alcohol profesional 0.32, negativa drogas">
      </div>

      <div class="acciones">
        <button type="button" onclick="buscar()">Buscar</button>
        <button type="button" onclick="limpiarTodo()">Limpiar</button>
      </div>

      <div id="resultado" class="resultado">Esperando consulta...</div>
    </div>
  </div>

  <script>
    const URL = "BASE_INFRACCIONES.csv";

    let estado = {
      materia: "",
      vehiculo: "",
      situacion: "",
      grupoAlcohol: ""
    };

    function actualizarVisibilidadAlcohol() {
      const bloque = document.getElementById("bloqueGrupoAlcohol");
      if (estado.materia === "ALCOHOL") {
        bloque.classList.remove("oculto");
      } else {
        bloque.classList.add("oculto");
        estado.grupoAlcohol = "";
        document.querySelectorAll("#botonesGrupoAlcohol button").forEach(b => b.classList.remove("activo"));
      }
    }

    function seleccionar(campo, valor, boton) {
      estado[campo] = valor;

      let contenedorId = "";
      if (campo === "materia") contenedorId = "botonesMateria";
      if (campo === "vehiculo") contenedorId = "botonesVehiculo";
      if (campo === "situacion") contenedorId = "botonesSituacion";
      if (campo === "grupoAlcohol") contenedorId = "botonesGrupoAlcohol";

      const botones = document.querySelectorAll(`#${contenedorId} button`);
      botones.forEach(b => b.classList.remove("activo"));
      boton.classList.add("activo");

      if (campo === "materia") actualizarVisibilidadAlcohol();
    }

    function limpiarTodo() {
      estado = {
        materia: "",
        vehiculo: "",
        situacion: "",
        grupoAlcohol: ""
      };

      document.getElementById("texto").value = "";
      document.querySelectorAll("button.activo").forEach(b => b.classList.remove("activo"));
      document.getElementById("resultado").innerHTML = "Esperando consulta...";
      actualizarVisibilidadAlcohol();
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    async function cargarDatos() {
      const res = await fetch(URL, { method: "GET" });
      if (!res.ok) throw new Error("No se pudo leer el CSV. HTTP " + res.status);

      const text = await res.text();
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
      if (lines.length < 2) throw new Error("El CSV está vacío o no tiene datos.");

      const headers = parseCSVLine(lines[0]).map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (values[i] || "").trim();
        });
        return obj;
      }).filter(r => r && r.id);
    }

    function normalizarTexto(texto) {
      return texto
        .toLowerCase()
        .replaceAll("vehículo", " ")
        .replaceAll("vehiculo", " ")
        .replaceAll("coche", " turismo ")
        .replaceAll("moto", " motocicleta ")
        .replaceAll("camion", " 3ª categoría ")
        .replaceAll("camión", " 3ª categoría ")
        .replaceAll("autobus", " 3ª categoría ")
        .replaceAll("autobús", " 3ª categoría ")
        .replaceAll("bus", " 3ª categoría ")
        .replaceAll("pesado", " 3ª categoría ")
        .replaceAll("trailer", " 3ª categoría ")
        .replaceAll("tráiler", " 3ª categoría ")
        .replaceAll("sin carnet", " sin permiso nunca obtenido ")
        .replaceAll("carnet", " permiso ")
        .replaceAll("rehusarse", " negativa ")
        .replaceAll("rehusar", " negativa ")
        .replaceAll("negarse", " negativa ")
        .replaceAll("profesionales", " profesional ")
        .replaceAll("noveles", " novel ")
        .replaceAll("novel", " novel ")
        .replaceAll("reincidencia", " reincidente ")
        .replaceAll(/\s+/g, " ")
        .trim();
    }

    function formatearValor(v) {
      if (v === null || v === undefined) return "—";
      const s = String(v).trim();
      if (!s) return "—";
      if (/^\d+(\.0+)?$/.test(s)) return String(parseInt(parseFloat(s), 10));
      return s;
    }

    function extraerNumeroAlcohol(texto) {
      const m = texto.match(/(\d+[.,]\d+)/);
      if (!m) return null;
      return parseFloat(m[1].replace(",", "."));
    }

    function esConsultaAlcohol(texto, materia) {
      return materia === "ALCOHOL" || /\balcohol\b|\betilometr|\btasa\b|\bmg\/l\b|\bgr\/l\b|\bsangre\b|\baire\b/.test(texto);
    }

    function esConsultaDrogas(texto, materia) {
      return materia === "DROGAS" || /\bdroga\b|\bdrogas\b|\bdrogotest\b|\bsaliva\b/.test(texto);
    }

    function esNegativa(texto) {
      return /\bnegativa\b|\bno someterse\b|\bnegarse\b/.test(texto);
    }

    function esEspecialAlcohol(texto, grupo) {
      if (grupo === "ESPECIAL") return true;
      return /\bprofesional\b|\bnovel\b|\burgencia\b|\bmercancias peligrosas\b|\bmercancías peligrosas\b|\btransporte especial\b/.test(texto);
    }

    function esReincidenteAlcohol(texto, grupo) {
      if (grupo === "REINCIDENTE") return true;
      return /\breincidente\b|\bantecedente\b|\bsancion firme\b|\bsanción firme\b/.test(texto);
    }

    function esSangre(texto) {
      return /\bsangre\b|\bg\/l\b|\bgramos?\b/.test(texto);
    }

    function esAire(texto) {
      return /\baire\b|\bmg\/l\b|\betilomet/.test(texto);
    }

    function inferirVehiculoDesdeTexto(texto) {
      if (/\b3ª categoría\b/.test(texto)) return "3ª CATEGORÍA";
      if (/\bmotocicleta\b/.test(texto)) return "MOTOCICLETA";
      if (/\bciclomotor\b/.test(texto)) return "CICLOMOTOR";
      if (/\bturismo\b/.test(texto)) return "TURISMO";
      return "";
    }

    function getWildcardVehiculo(v) {
      return v === "—" || v === "TODOS" || !v;
    }

    function resolverAlcohol(data, texto) {
      const alcoholRows = data.filter(r => r.submateria === "ALCOHOL");
      if (alcoholRows.length === 0) return null;

      if (esNegativa(texto)) {
        return alcoholRows.find(r => r.norma === "CIR" && formatearValor(r.articulo) === "021" && r.opcion === "5F") || null;
      }

      const numero = extraerNumeroAlcohol(texto);
      const especial = esEspecialAlcohol(texto, estado.grupoAlcohol);
      const reincidente = esReincidenteAlcohol(texto, estado.grupoAlcohol);
      const sangre = esSangre(texto) && !esAire(texto);

      let opcion = "";

      if (reincidente) {
        if (especial) {
          opcion = sangre ? "5O" : "5Ñ";
        } else {
          opcion = sangre ? "5N" : "5M";
        }
      } else {
        if (especial) {
          if (sangre) {
            opcion = (numero !== null && numero > 0.60) ? "5L" : "5H";
          } else {
            opcion = (numero !== null && numero > 0.30) ? "5K" : "5G";
          }
        } else {
          if (sangre) {
            opcion = (numero !== null && numero > 1.00) ? "5J" : "5F";
          } else {
            opcion = (numero !== null && numero > 0.50) ? "5I" : "5E";
          }
        }
      }

      return alcoholRows.find(r => r.opcion === opcion) || null;
    }

    function resolverDrogas(data, texto) {
      const drogasRows = data.filter(r => r.submateria === "DROGAS");
      if (drogasRows.length === 0) return null;

      if (esNegativa(texto)) {
        if (/\baccidente\b|\binfraccion\b|\binfracción\b|\busuario\b/.test(texto)) {
          return drogasRows.find(r => formatearValor(r.articulo) === "014" && formatearValor(r.apartado) === "2" && r.opcion === "5C") || null;
        }
        return drogasRows.find(r => formatearValor(r.articulo) === "014" && formatearValor(r.apartado) === "2" && r.opcion === "5A") || null;
      }

      return drogasRows.find(r => formatearValor(r.articulo) === "014" && formatearValor(r.apartado) === "1" && r.opcion === "5A") || null;
    }

    function puntuarFila(r, textoNormalizado, vehiculoInferido) {
      let score = 0;
      const palabras = textoNormalizado ? textoNormalizado.split(" ") : [];
      const claves = (r.palabras_clave || "").toLowerCase();
      const submateria = (r.submateria || "").toLowerCase();
      const literal = (r.texto_literal || "").toLowerCase();
      const comentario = (r.comentario_operativo || "").toLowerCase();
      const accion = (r.accion_prioritaria || "").toLowerCase();

      palabras.forEach(p => {
        if (!p) return;
        if (claves.includes(p)) score += 4;
        if (submateria.includes(p)) score += 3;
        if (literal.includes(p)) score += 2;
        if (comentario.includes(p)) score += 1;
        if (accion.includes(p)) score += 1;
      });

      if (estado.materia && r.submateria === estado.materia) score += 25;

      const vehiculoActivo = estado.vehiculo || vehiculoInferido;
      if (vehiculoActivo && (r.vehiculo_tipo === vehiculoActivo || getWildcardVehiculo(r.vehiculo_tipo))) score += 12;
      if (estado.situacion && r.situacion === estado.situacion) score += 12;

      if (vehiculoActivo === "3ª CATEGORÍA" && r.submateria === "SEGURO" && r.vehiculo_tipo === "3ª CATEGORÍA") score += 25;

      return score;
    }

    function aplicarReglasOperativas(r, textoNormalizado) {
      const numero = extraerNumeroAlcohol(textoNormalizado);
      const consultaAlcohol = esConsultaAlcohol(textoNormalizado, estado.materia);
      const consultaDrogas = esConsultaDrogas(textoNormalizado, estado.materia);

      let penalOperativo = false;
      let referenciaPenal = r.referencia_penal || "";
      let accion = r.accion_prioritaria || "";
      let comentario = r.comentario_operativo || "";

      if (esNegativa(textoNormalizado) && (consultaAlcohol || consultaDrogas)) {
        penalOperativo = true;
        referenciaPenal = "CP 383";
        accion = "Tramitar diligencias penales e inmovilizar el vehículo";
      }

      if (consultaAlcohol && numero !== null) {
        const sangre = esSangre(textoNormalizado) && !esAire(textoNormalizado);
        if ((!sangre && numero > 0.65) || (sangre && numero > 1.10)) {
          penalOperativo = true;
          referenciaPenal = "CP 379.2";
          accion = "Valorar vía penal por tasa penal e inmovilizar el vehículo";
        }
      }

      return {
        ...r,
        penal_operativo: penalOperativo,
        referencia_penal_operativa: referenciaPenal,
        accion_prioritaria_operativa: accion,
        comentario_operativo_extendido: comentario
      };
    }

    async function buscar() {
      const div = document.getElementById("resultado");
      div.textContent = "Buscando...";

      try {
        const data = await cargarDatos();
        const textoUsuario = document.getElementById("texto").value;
        const texto = normalizarTexto(textoUsuario);
        const vehiculoInferido = inferirVehiculoDesdeTexto(texto);

        let resultadoDirecto = null;
        if (esConsultaAlcohol(texto, estado.materia)) {
          resultadoDirecto = resolverAlcohol(data, texto);
        } else if (esConsultaDrogas(texto, estado.materia)) {
          resultadoDirecto = resolverDrogas(data, texto);
        }

        let candidatos = data.filter(r => {
          if (estado.materia && r.submateria !== estado.materia) return false;

          const vehiculoActivo = estado.vehiculo || vehiculoInferido;
          if (vehiculoActivo && r.vehiculo_tipo !== vehiculoActivo && !getWildcardVehiculo(r.vehiculo_tipo)) return false;

          if (estado.situacion && r.situacion !== estado.situacion) return false;
          return true;
        });

        if (candidatos.length === 0) candidatos = data;

        const puntuados = candidatos
          .map(r => ({ ...r, score: puntuarFila(r, texto, vehiculoInferido) }))
          .sort((a, b) => b.score - a.score);

        let mejores = puntuados.filter(r => r.score > 0).slice(0, 3);

        if (resultadoDirecto) {
          const resto = puntuados.filter(r => r.id !== resultadoDirecto.id).slice(0, 2);
          mejores = [resultadoDirecto, ...resto];
        }

        if (mejores.length === 0) {
          div.innerHTML = "Sin resultados.";
          return;
        }

        const r = aplicarReglasOperativas(mejores[0], texto);

        let html = `
<div class="titulo-resultado">${r.norma} ${formatearValor(r.articulo)}.${formatearValor(r.apartado)} ${r.opcion}</div>
<div><strong>Texto:</strong> ${r.texto_literal}</div>
<div><strong>Calificación:</strong> ${r.calificacion}</div>
<div><strong>Puntos:</strong> ${formatearValor(r.puntos)}</div>
<div><strong>Importe:</strong> ${formatearValor(r.importe)} €</div>
<div><strong>Importe reducido:</strong> ${formatearValor(r.importe_reducido)} €</div>
<div><strong>Responsable:</strong> ${r.responsable}</div>
`;

        if (r.inmovilizacion_procede === "SI") {
          html += `<div class="alerta alerta-inmo">Inmovilización: SÍ${r.inmovilizacion_base ? " (" + r.inmovilizacion_base + ")" : ""}</div>`;
        } else {
          html += `<div class="secundario"><strong>Inmovilización:</strong> NO</div>`;
        }

        if (r.alerta_penal === "SI" || r.penal_operativo) {
          html += `<div class="alerta alerta-penal">Relevancia penal: ${r.referencia_penal_operativa || r.referencia_penal || "Sí"}</div>`;
        }

        if (r.comentario_operativo_extendido && r.comentario_operativo_extendido !== "—") {
          html += `<div class="secundario"><strong>Comentario operativo:</strong> ${r.comentario_operativo_extendido}</div>`;
        }

        if ((r.accion_prioritaria_operativa || r.accion_prioritaria) && (r.accion_prioritaria_operativa || r.accion_prioritaria) !== "—") {
          html += `<div class="secundario"><strong>Acción prioritaria:</strong> ${r.accion_prioritaria_operativa || r.accion_prioritaria}</div>`;
        }

        if (mejores.length > 1) {
          html += `<hr><div><strong>Otras sugerencias:</strong></div>`;
          mejores.slice(1).forEach(s => {
            html += `<div class="secundario">${s.norma} ${formatearValor(s.articulo)}.${formatearValor(s.apartado)} ${s.opcion} — ${s.texto_literal}</div>`;
          });
        }

        div.innerHTML = html;

      } catch (error) {
        div.innerHTML = `Error: ${error.message}`;
        console.error(error);
      }
    }

    actualizarVisibilidadAlcohol();
  </script>
</body>
</html>
