
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Consulta Infracciones DGT</title>
  <style>
    :root{
      --bg1:#0f172a; --bg2:#1e293b; --card:#ffffff; --soft:#f8fafc; --line:#dbe3ee;
      --text:#0f172a; --muted:#475569; --primary:#1d4ed8; --primary-strong:#1e40af;
      --primary-soft:#dbeafe; --warn:#f59e0b; --warn-bg:#fef3c7; --danger:#dc2626;
      --danger-bg:#fee2e2; --ok:#065f46; --ok-bg:#d1fae5; --radius:18px;
      --shadow:0 14px 34px rgba(15,23,42,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Arial,sans-serif;color:var(--text);
      background:radial-gradient(circle at top, rgba(29,78,216,.24), transparent 32%), linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;padding:12px;
    }
    .app{max-width:900px;margin:0 auto}
    .hero{color:#fff;padding:6px 4px 14px}
    .hero h1{margin:0 0 6px;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.1}
    .hero p{margin:0;color:rgba(255,255,255,.82)}
    .panel{background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.45);border-radius:24px;padding:14px;box-shadow:var(--shadow)}
    .section{background:var(--soft);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
    .section h2{margin:0 0 10px;font-size:1rem;color:#1e293b}
    .section h3{margin:0 0 8px;font-size:.92rem;color:#334155}
    .row{display:flex;flex-wrap:wrap;gap:8px}
    .stack{display:flex;flex-direction:column;gap:10px}
    button{
      appearance:none;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:999px;padding:12px 14px;
      min-height:44px;font-size:.95rem;font-weight:700;line-height:1;cursor:pointer;transition:.12s ease
    }
    button:hover{transform:translateY(-1px)} button:active{transform:none}
    button.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 10px 22px rgba(29,78,216,.26)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .actions button{border-radius:14px}
    .actions .primary{background:var(--primary); color:#fff; border-color:var(--primary)}
    .actions .primary:hover{background:var(--primary-strong)}
    .manual input{
      width:100%;padding:13px 14px;font-size:16px;border:1px solid var(--line);border-radius:14px;outline:none;background:#fff
    }
    .manual input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(29,78,216,.12)}
    .hint{font-size:.88rem;color:var(--muted);margin-top:6px}
    .step{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}
    .step-title{font-weight:700;margin-bottom:8px}
    .path{font-size:.9rem;color:var(--muted)}
    .result{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;min-height:120px}
    .title{font-size:1.14rem;font-weight:800;margin:0 0 12px}
    .field{margin:0 0 7px;line-height:1.45}
    .muted{color:var(--muted)}
    .alert{padding:11px 12px;border-radius:14px;margin-top:10px;font-weight:700;line-height:1.35}
    .alert.penal{background:var(--danger-bg);border:1px solid #fca5a5;color:#991b1b}
    .alert.inmo{background:var(--warn-bg);border:1px solid #fcd34d;color:#92400e}
    .badge{display:inline-block;padding:7px 10px;border-radius:999px;font-size:.82rem;font-weight:700;margin:0 6px 8px 0;border:1px solid transparent}
    .badge.blue{background:var(--primary-soft); color:var(--primary-strong); border-color:#bfdbfe}
    .badge.green{background:var(--ok-bg); color:var(--ok); border-color:#6ee7b7}
    @media (max-width:680px){
      .row button{flex:1 1 calc(50% - 8px)}
      .actions{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>Modo Patrulla DGT</h1>
    <p>Consulta cerrada por árboles de decisión, con apoyo opcional de búsqueda manual.</p>
  </div>

  <div class="panel">
    <div class="section">
      <h2>Materia</h2>
      <div class="row" id="materiaRow">
        <button data-materia="ALCOHOL">ALCOHOL</button>
        <button data-materia="DROGAS">DROGAS</button>
        <button data-materia="SOA">SOA</button>
        <button data-materia="ITV">ITV</button>
        <button data-materia="PERMISOS">PERMISOS CONDUCIR</button>
      </div>
    </div>

    <div class="section manual">
      <h2>Búsqueda manual secundaria</h2>
      <input id="manualInput" type="text" placeholder="Escribe una conducta si quieres buscar manualmente">
      <div class="hint">El árbol tiene prioridad. La búsqueda libre queda como apoyo.</div>
    </div>

    <div id="treeArea" class="stack"></div>

    <div class="actions">
      <button class="primary" id="btnResolver" type="button">Resolver</button>
      <button id="btnVolver" type="button">Volver</button>
      <button id="btnBuscarManual" type="button">Buscar manual</button>
      <button id="btnLimpiar" type="button">Limpiar</button>
    </div>

    <div id="resultado" class="result">Selecciona una materia para empezar.</div>
  </div>
</div>

<script>
const URL = "BASE_INFRACCIONES.csv";
let manualRows = [];

const state = {
  materia: "",
  history: [],
  alcohol: {grupo:"", reincidente:"", medio:"", supuesto:""},
  drogas: {supuesto:""},
  soa: {vehiculo:"", circula:""},
  itv: {estado:"", detalle:""},
  permisos: {tipo:"", detalle:""}
};

function cleanRows(rows){
  return rows.filter(r => r && r.id);
}
function parseCSVLine(line){
  const result=[]; let current=""; let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch === '"'){
      if(inQuotes && line[i+1] === '"'){ current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === ',' && !inQuotes){
      result.push(current); current="";
    } else current += ch;
  }
  result.push(current);
  return result;
}
async function loadCSV(){
  try{
    const res = await fetch(URL,{method:"GET"});
    if(!res.ok) return [];
    const text = await res.text();
    const lines = text.split(/\r?\n/).filter(x => x.trim() !== "");
    if(lines.length < 2) return [];
    const headers = parseCSVLine(lines[0]).map(h=>h.trim());
    const rows = lines.slice(1).map(line=>{
      const vals = parseCSVLine(line);
      const obj = {};
      headers.forEach((h,i)=> obj[h] = (vals[i] || "").trim());
      return obj;
    });
    return cleanRows(rows);
  }catch(e){
    return [];
  }
}
function resetAll(){
  state.materia = "";
  state.history = [];
  state.alcohol = {grupo:"", reincidente:"", medio:"", supuesto:""};
  state.drogas = {supuesto:""};
  state.soa = {vehiculo:"", circula:""};
  state.itv = {estado:"", detalle:""};
  state.permisos = {tipo:"", detalle:""};
  document.getElementById("manualInput").value = "";
  document.querySelectorAll("#materiaRow button").forEach(b=>b.classList.remove("active"));
  document.getElementById("treeArea").innerHTML = "";
  document.getElementById("resultado").innerHTML = "Selecciona una materia para empezar.";
}
function activateMatterButton(materia){
  document.querySelectorAll("#materiaRow button").forEach(b=>{
    b.classList.toggle("active", b.dataset.materia === materia);
  });
}
function pushHistory(){
  state.history.push(JSON.stringify({
    materia: state.materia,
    alcohol: state.alcohol,
    drogas: state.drogas,
    soa: state.soa,
    itv: state.itv,
    permisos: state.permisos
  }));
}
function goBack(){
  if(!state.history.length) return;
  const prev = JSON.parse(state.history.pop());
  state.materia = prev.materia;
  state.alcohol = prev.alcohol;
  state.drogas = prev.drogas;
  state.soa = prev.soa;
  state.itv = prev.itv;
  state.permisos = prev.permisos;
  activateMatterButton(state.materia);
  renderTree();
}
function selectMatter(materia){
  pushHistory();
  state.materia = materia;
  state.alcohol = {grupo:"", reincidente:"", medio:"", supuesto:""};
  state.drogas = {supuesto:""};
  state.soa = {vehiculo:"", circula:""};
  state.itv = {estado:"", detalle:""};
  state.permisos = {tipo:"", detalle:""};
  activateMatterButton(materia);
  renderTree();
  document.getElementById("resultado").innerHTML = "Completa el árbol y pulsa Resolver.";
}
document.querySelectorAll("#materiaRow button").forEach(btn=>{
  btn.addEventListener("click", ()=> selectMatter(btn.dataset.materia));
});

function makeStep(title, options, current, onPick){
  const wrap = document.createElement("div");
  wrap.className = "step";
  wrap.innerHTML = `<div class="step-title">${title}</div>`;
  const row = document.createElement("div");
  row.className = "row";
  options.forEach(opt=>{
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = opt;
    if(opt === current) b.classList.add("active");
    b.onclick = ()=> onPick(opt);
    row.appendChild(b);
  });
  wrap.appendChild(row);
  return wrap;
}
function renderPath(text){
  const el = document.createElement("div");
  el.className = "path";
  el.textContent = text;
  return el;
}
function renderTree(){
  const area = document.getElementById("treeArea");
  area.innerHTML = "";
  if(!state.materia) return;

  if(state.materia === "ALCOHOL"){
    area.appendChild(makeStep("1. Grupo", ["CONDUCTORES EN GENERAL", "NÓVELES / PROFESIONALES"], state.alcohol.grupo, (opt)=>{
      pushHistory();
      state.alcohol.grupo = opt;
      state.alcohol.reincidente = "";
      state.alcohol.medio = "";
      state.alcohol.supuesto = "";
      renderTree();
    }));
    if(state.alcohol.grupo){
      area.appendChild(makeStep("2. ¿Reincidente?", ["SÍ","NO"], state.alcohol.reincidente, (opt)=>{
        pushHistory();
        state.alcohol.reincidente = opt;
        state.alcohol.medio = "";
        state.alcohol.supuesto = "";
        renderTree();
      }));
    }
    if(state.alcohol.reincidente){
      area.appendChild(makeStep("3. Medio", ["AIRE ESPIRADO", "SANGRE", "ACCIDENTE / INFRACCIÓN", "NEGATIVA A REALIZAR PRUEBA"], state.alcohol.medio, (opt)=>{
        pushHistory();
        state.alcohol.medio = opt;
        state.alcohol.supuesto = "";
        renderTree();
      }));
    }
    if(state.alcohol.medio){
      const general = state.alcohol.grupo === "CONDUCTORES EN GENERAL";
      const rein = state.alcohol.reincidente === "SÍ";

      // Negativa: se resuelve ya en el paso 3. No necesita paso 4 y no depende realmente del grupo/reincidencia.
      if(state.alcohol.medio === "NEGATIVA A REALIZAR PRUEBA"){
        state.alcohol.supuesto = "Negativa a realizar prueba";
        area.appendChild(renderPath(`Ruta: ALCOHOL → ${state.alcohol.grupo || "—"} → ${state.alcohol.reincidente || "—"} → NEGATIVA A REALIZAR PRUEBA`));
      } else {
        let options = [];
        if(state.alcohol.medio === "AIRE ESPIRADO"){
          if(general && !rein) options = ["> 0,25 y < 0,50", "> 0,50 y < 0,66", "0,66 o superior"];
          if(general && rein) options = ["> 0,25 y < 0,66", "0,66 o superior"];
          if(!general && !rein) options = ["> 0,15 y < 0,30", "> 0,30 y < 0,66", "0,66 o superior"];
          if(!general && rein) options = ["> 0,15 y < 0,66", "0,66 o superior"];
        } else if(state.alcohol.medio === "SANGRE"){
          if(general && !rein) options = ["> 0,50 y < 1,00", "> 1,00 y < 1,10", "1,10 o superior"];
          if(general && rein) options = ["> 0,50 y < 1,10", "1,10 o superior"];
          if(!general && !rein) options = ["> 0,30 y < 0,60", "> 0,60 y < 1,10", "1,10 o superior"];
          if(!general && rein) options = ["> 0,30 y < 1,10", "1,10 o superior"];
        } else if(state.alcohol.medio === "ACCIDENTE / INFRACCIÓN"){
          options = ["0,40 + accidente / infracción"];
        }

        area.appendChild(makeStep("4. Supuesto", options, state.alcohol.supuesto, (opt)=>{
          pushHistory();
          state.alcohol.supuesto = opt;
          renderTree();
        }));
        area.appendChild(renderPath(`Ruta: ALCOHOL → ${state.alcohol.grupo || "—"} → ${state.alcohol.reincidente || "—"} → ${state.alcohol.medio || "—"} → ${state.alcohol.supuesto || "—"}`));
      }
    }
  }

  if(state.materia === "DROGAS"){
    area.appendChild(makeStep("1. Supuesto", ["POSITIVO", "NEGATIVA A REALIZAR PRUEBA"], state.drogas.supuesto, (opt)=>{
      pushHistory();
      state.drogas.supuesto = opt;
      renderTree();
    }));
    area.appendChild(renderPath(`Ruta: DROGAS → ${state.drogas.supuesto || "—"}`));
  }

  if(state.materia === "SOA"){
    area.appendChild(makeStep("1. Vehículo", ["CICLOMOTOR","MOTOCICLETA","TURISMO","3ª CATEGORÍA"], state.soa.vehiculo, (opt)=>{
      pushHistory();
      state.soa.vehiculo = opt;
      state.soa.circula = "";
      renderTree();
    }));
    if(state.soa.vehiculo){
      area.appendChild(makeStep("2. ¿Circula?", ["SÍ","NO"], state.soa.circula, (opt)=>{
        pushHistory();
        state.soa.circula = opt;
        renderTree();
      }));
    }
    area.appendChild(renderPath(`Ruta: SOA → ${state.soa.vehiculo || "—"} → ${state.soa.circula || "—"}`));
  }

  if(state.materia === "ITV"){
    area.appendChild(makeStep("1. Estado ITV", ["CADUCADA","DESFAVORABLE","NEGATIVA"], state.itv.estado, (opt)=>{
      pushHistory();
      state.itv.estado = opt;
      state.itv.detalle = "";
      renderTree();
    }));
    if(state.itv.estado === "DESFAVORABLE"){
      area.appendChild(makeStep("2. Detalle", ["CIRCULANDO", "FUERA DE PLAZO"], state.itv.detalle, (opt)=>{
        pushHistory();
        state.itv.detalle = opt;
        renderTree();
      }));
    }
    if(state.itv.estado === "NEGATIVA"){
      area.appendChild(makeStep("2. Detalle", ["CIRCULANDO", "PONER EN CIRCULACIÓN"], state.itv.detalle, (opt)=>{
        pushHistory();
        state.itv.detalle = opt;
        renderTree();
      }));
    }
    area.appendChild(renderPath(`Ruta: ITV → ${state.itv.estado || "—"} → ${state.itv.detalle || "—"}`));
  }

  if(state.materia === "PERMISOS"){
    area.appendChild(makeStep("1. Tipo", ["CADUCADO","SIN PERMISO","PERMISO NO VÁLIDO"], state.permisos.tipo, (opt)=>{
      pushHistory();
      state.permisos.tipo = opt;
      state.permisos.detalle = "";
      renderTree();
    }));
    if(state.permisos.tipo === "SIN PERMISO"){
      area.appendChild(makeStep("2. Detalle", ["NUNCA OBTENIDO","PÉRDIDA TOTAL DE PUNTOS","PRIVACIÓN JUDICIAL","OTRO SUPUESTO ADMINISTRATIVO"], state.permisos.detalle, (opt)=>{
        pushHistory();
        state.permisos.detalle = opt;
        renderTree();
      }));
    }
    if(state.permisos.tipo === "PERMISO NO VÁLIDO"){
      area.appendChild(makeStep("2. Detalle", ["EXTRANJERO CANJEABLE","EXTRANJERO NO CANJEABLE","NO HABILITA PARA ESE VEHÍCULO","INCUMPLIMIENTO DE REQUISITOS ADMINISTRATIVOS"], state.permisos.detalle, (opt)=>{
        pushHistory();
        state.permisos.detalle = opt;
        renderTree();
      }));
    }
    area.appendChild(renderPath(`Ruta: PERMISOS → ${state.permisos.tipo || "—"} → ${state.permisos.detalle || "—"}`));
  }
}

function recordFromTree(){
  if(state.materia === "SOA"){
    const map = {
      "CICLOMOTOR|SÍ":"1", "MOTOCICLETA|SÍ":"2", "TURISMO|SÍ":"3", "3ª CATEGORÍA|SÍ":"4",
      "CICLOMOTOR|NO":"5", "MOTOCICLETA|NO":"6", "TURISMO|NO":"7", "3ª CATEGORÍA|NO":"8"
    };
    return manualRows.find(r => r.id === map[`${state.soa.vehiculo}|${state.soa.circula}`]) || null;
  }
  if(state.materia === "DROGAS"){
    const id = state.drogas.supuesto === "POSITIVO" ? "18" : state.drogas.supuesto === "NEGATIVA A REALIZAR PRUEBA" ? "19" : "";
    return manualRows.find(r => r.id === id) || null;
  }
  if(state.materia === "ITV"){
    let id = "";
    if(state.itv.estado === "CADUCADA") id = "20";
    if(state.itv.estado === "DESFAVORABLE" && state.itv.detalle === "CIRCULANDO") id = "21";
    if(state.itv.estado === "DESFAVORABLE" && state.itv.detalle === "FUERA DE PLAZO") id = "22";
    if(state.itv.estado === "NEGATIVA" && state.itv.detalle === "CIRCULANDO") id = "23";
    if(state.itv.estado === "NEGATIVA" && state.itv.detalle === "PONER EN CIRCULACIÓN") id = "24";
    return manualRows.find(r => r.id === id) || null;
  }
  if(state.materia === "PERMISOS"){
    let id = "";
    if(state.permisos.tipo === "CADUCADO") id = "9";
    if(state.permisos.tipo === "SIN PERMISO" && state.permisos.detalle === "NUNCA OBTENIDO") id = "10";
    if(state.permisos.tipo === "SIN PERMISO" && state.permisos.detalle === "PÉRDIDA TOTAL DE PUNTOS") id = "11";
    if(state.permisos.tipo === "SIN PERMISO" && state.permisos.detalle === "PRIVACIÓN JUDICIAL") id = "12";
    if(state.permisos.tipo === "SIN PERMISO" && state.permisos.detalle === "OTRO SUPUESTO ADMINISTRATIVO") id = "13";
    if(state.permisos.tipo === "PERMISO NO VÁLIDO" && state.permisos.detalle === "EXTRANJERO CANJEABLE") id = "14";
    if(state.permisos.tipo === "PERMISO NO VÁLIDO" && state.permisos.detalle === "EXTRANJERO NO CANJEABLE") id = "15";
    if(state.permisos.tipo === "PERMISO NO VÁLIDO" && state.permisos.detalle === "NO HABILITA PARA ESE VEHÍCULO") id = "16";
    if(state.permisos.tipo === "PERMISO NO VÁLIDO" && state.permisos.detalle === "INCUMPLIMIENTO DE REQUISITOS ADMINISTRATIVOS") id = "17";
    return manualRows.find(r => r.id === id) || null;
  }
  if(state.materia === "ALCOHOL"){
    const g = state.alcohol.grupo;
    const r = state.alcohol.reincidente;
    const m = state.alcohol.medio;
    const s = state.alcohol.supuesto;
    let id = "";

    if(m === "NEGATIVA A REALIZAR PRUEBA") id = "37";

    if(g === "CONDUCTORES EN GENERAL" && r === "NO" && m === "AIRE ESPIRADO" && s === "> 0,25 y < 0,50") id = "25";
    if(g === "CONDUCTORES EN GENERAL" && r === "NO" && m === "AIRE ESPIRADO" && s === "> 0,50 y < 0,66") id = "27";
    if(g === "CONDUCTORES EN GENERAL" && r === "NO" && m === "AIRE ESPIRADO" && s === "0,66 o superior") id = "27";

    if(g === "CONDUCTORES EN GENERAL" && r === "NO" && m === "SANGRE" && s === "> 0,50 y < 1,00") id = "26";
    if(g === "CONDUCTORES EN GENERAL" && r === "NO" && m === "SANGRE" && s === "> 1,00 y < 1,10") id = "28";
    if(g === "CONDUCTORES EN GENERAL" && r === "NO" && m === "SANGRE" && s === "1,10 o superior") id = "28";

    if(g === "CONDUCTORES EN GENERAL" && r === "SÍ" && m === "AIRE ESPIRADO" && s === "> 0,25 y < 0,66") id = "29";
    if(g === "CONDUCTORES EN GENERAL" && r === "SÍ" && m === "AIRE ESPIRADO" && s === "0,66 o superior") id = "29";
    if(g === "CONDUCTORES EN GENERAL" && r === "SÍ" && m === "SANGRE" && s === "> 0,50 y < 1,10") id = "30";
    if(g === "CONDUCTORES EN GENERAL" && r === "SÍ" && m === "SANGRE" && s === "1,10 o superior") id = "30";

    if(g === "NÓVELES / PROFESIONALES" && r === "NO" && m === "AIRE ESPIRADO" && s === "> 0,15 y < 0,30") id = "31";
    if(g === "NÓVELES / PROFESIONALES" && r === "NO" && m === "AIRE ESPIRADO" && s === "> 0,30 y < 0,66") id = "33";
    if(g === "NÓVELES / PROFESIONALES" && r === "NO" && m === "AIRE ESPIRADO" && s === "0,66 o superior") id = "33";

    if(g === "NÓVELES / PROFESIONALES" && r === "NO" && m === "SANGRE" && s === "> 0,30 y < 0,60") id = "32";
    if(g === "NÓVELES / PROFESIONALES" && r === "NO" && m === "SANGRE" && s === "> 0,60 y < 1,10") id = "34";
    if(g === "NÓVELES / PROFESIONALES" && r === "NO" && m === "SANGRE" && s === "1,10 o superior") id = "34";

    if(g === "NÓVELES / PROFESIONALES" && r === "SÍ" && m === "AIRE ESPIRADO" && s === "> 0,15 y < 0,66") id = "35";
    if(g === "NÓVELES / PROFESIONALES" && r === "SÍ" && m === "AIRE ESPIRADO" && s === "0,66 o superior") id = "35";
    if(g === "NÓVELES / PROFESIONALES" && r === "SÍ" && m === "SANGRE" && s === "> 0,30 y < 1,10") id = "36";
    if(g === "NÓVELES / PROFESIONALES" && r === "SÍ" && m === "SANGRE" && s === "1,10 o superior") id = "36";

    if(m === "ACCIDENTE / INFRACCIÓN" && s === "0,40 + accidente / infracción"){
      if(g === "CONDUCTORES EN GENERAL") id = (r === "SÍ" ? "29" : "25");
      if(g === "NÓVELES / PROFESIONALES") id = (r === "SÍ" ? "35" : "31");
    }
    return manualRows.find(r => r.id === id) || null;
  }
  return null;
}

function applyOperationalOverlays(record){
  if(!record) return null;
  const out = {...record};
  if(state.materia === "ALCOHOL"){
    const m = state.alcohol.medio;
    const s = state.alcohol.supuesto;
    if(m === "NEGATIVA A REALIZAR PRUEBA"){
      out.alerta_penal = "SI";
      out.referencia_penal = "CP 383";
      out.accion_prioritaria = "Tramitar diligencias penales y adoptar medidas sobre el vehículo";
      out.comentario_operativo = "La negativa a la prueba de alcohol tiene reproche penal.";
    }
    if(s === "0,66 o superior"){
      out.alerta_penal = "SI";
      out.referencia_penal = "CP 379.2";
      out.accion_prioritaria = "Tramitar diligencias penales por tasa penal y adoptar medidas sobre el vehículo";
      out.comentario_operativo = "Tasa penal en aire espirado desde 0,66 o superior, según criterio operativo fijado.";
    }
    if(s === "1,10 o superior"){
      out.alerta_penal = "SI";
      out.referencia_penal = "CP 379.2";
      out.accion_prioritaria = "Tramitar diligencias penales por tasa penal y adoptar medidas sobre el vehículo";
      out.comentario_operativo = "Tasa penal en sangre desde 1,10 o superior, según criterio operativo fijado.";
    }
    if(m === "ACCIDENTE / INFRACCIÓN"){
      out.alerta_penal = "SI";
      out.referencia_penal = "Valorar CP 379.2 por influencia";
      out.accion_prioritaria = "Valorar diligencias penales por influencia según sintomatología, accidente o infracción";
      out.comentario_operativo = "No hay penal automático, pero debe valorarse la influencia en la conducción.";
    }
  }
  if(state.materia === "DROGAS" && state.drogas.supuesto === "NEGATIVA A REALIZAR PRUEBA"){
    out.alerta_penal = "SI";
    out.referencia_penal = "CP 383";
    out.accion_prioritaria = "Tramitar diligencias penales y adoptar medidas sobre el vehículo";
  }
  if(state.materia === "PERMISOS" && state.permisos.tipo === "SIN PERMISO"){
    const d = state.permisos.detalle;
    if(["NUNCA OBTENIDO","PÉRDIDA TOTAL DE PUNTOS","PRIVACIÓN JUDICIAL"].includes(d)){
      out.alerta_penal = "SI";
      out.referencia_penal = "CP 384";
      out.accion_prioritaria = "Valorar diligencias penales por conducción sin permiso en supuesto penal";
    } else {
      out.alerta_penal = "NO";
      out.referencia_penal = "—";
      out.accion_prioritaria = "Denunciar";
    }
  }
  return out;
}

function renderResult(record, mode="ÁRBOL"){
  const div = document.getElementById("resultado");
  if(!record){
    div.innerHTML = "No hay resultado con la selección actual.";
    return;
  }
  const penal = (record.alerta_penal || "").toUpperCase() === "SI";
  let html = `
    <div class="title">${record.norma} ${record.articulo}.${record.apartado} ${record.opcion}</div>
    <span class="badge blue">${mode}</span>
    ${state.materia ? `<span class="badge green">${state.materia}</span>` : ""}
    <div class="field"><strong>Texto:</strong> ${record.texto_literal}</div>
    <div class="field"><strong>Calificación:</strong> ${record.calificacion}</div>
    <div class="field"><strong>Puntos:</strong> ${record.puntos}</div>
    <div class="field"><strong>Importe:</strong> ${record.importe} €</div>
    <div class="field"><strong>Importe reducido:</strong> ${record.importe_reducido} €</div>
    <div class="field"><strong>Responsable:</strong> ${record.responsable}</div>
  `;
  if((record.inmovilizacion_procede || "").toUpperCase() === "SI"){
    html += `<div class="alert inmo">Inmovilización: SÍ${record.inmovilizacion_base ? " (" + record.inmovilizacion_base + ")" : ""}</div>`;
  } else {
    html += `<div class="field muted"><strong>Inmovilización:</strong> NO</div>`;
  }
  if(record.comentario_operativo && record.comentario_operativo !== "—"){
    html += `<div class="field muted"><strong>Comentario operativo:</strong> ${record.comentario_operativo}</div>`;
  }
  if(penal){
    html += `<div class="alert penal">Relevancia penal: ${record.referencia_penal || "Sí"}</div>`;
  }
  if(record.accion_prioritaria && record.accion_prioritaria !== "—"){
    html += `<div class="field muted"><strong>Acción prioritaria:</strong> ${record.accion_prioritaria}</div>`;
  }
  div.innerHTML = html;
}

function normalizarTexto(texto){
  return texto.toLowerCase()
    .replaceAll("vehículo"," ")
    .replaceAll("vehiculo"," ")
    .replaceAll("coche"," turismo ")
    .replaceAll("moto"," motocicleta ")
    .replaceAll("camión"," tercera categoria ")
    .replaceAll("camion"," tercera categoria ")
    .replaceAll("autobús"," tercera categoria ")
    .replaceAll("autobus"," tercera categoria ")
    .replaceAll("sin carnet"," sin permiso ")
    .replaceAll(/\s+/g," ")
    .trim();
}
function manualSearch(){
  const txt = normalizarTexto(document.getElementById("manualInput").value || "");
  if(!txt){
    renderResult(null);
    return;
  }
  const words = txt.split(" ").filter(Boolean);
  const scored = manualRows.map(r=>{
    const hay = `${r.submateria||""} ${r.palabras_clave||""} ${r.texto_literal||""} ${r.comentario_operativo||""}`.toLowerCase();
    let score = 0;
    words.forEach(w => { if(hay.includes(w)) score += 3; });
    return {...r, _score: score};
  }).sort((a,b)=> b._score - a._score);
  renderResult(scored[0] && scored[0]._score > 0 ? scored[0] : null, "MANUAL");
}

function isTreeComplete(){
  if(state.materia === "ALCOHOL"){
    if(state.alcohol.medio === "NEGATIVA A REALIZAR PRUEBA"){
      return !!(state.alcohol.grupo && state.alcohol.reincidente && state.alcohol.medio);
    }
    return !!(state.alcohol.grupo && state.alcohol.reincidente && state.alcohol.medio && state.alcohol.supuesto);
  }
  if(state.materia === "DROGAS") return !!state.drogas.supuesto;
  if(state.materia === "SOA") return !!(state.soa.vehiculo && state.soa.circula);
  if(state.materia === "ITV"){
    if(state.itv.estado === "CADUCADA") return true;
    if(state.itv.estado === "DESFAVORABLE") return !!state.itv.detalle;
    if(state.itv.estado === "NEGATIVA") return !!state.itv.detalle;
    return false;
  }
  if(state.materia === "PERMISOS"){
    if(state.permisos.tipo === "CADUCADO") return true;
    if(state.permisos.tipo === "SIN PERMISO") return !!state.permisos.detalle;
    if(state.permisos.tipo === "PERMISO NO VÁLIDO") return !!state.permisos.detalle;
    return false;
  }
  return false;
}

document.getElementById("btnResolver").addEventListener("click", ()=>{
  if(!state.materia || !isTreeComplete()){
    document.getElementById("resultado").innerHTML = "Completa el árbol antes de resolver.";
    return;
  }
  const rec = applyOperationalOverlays(recordFromTree());
  renderResult(rec, "ÁRBOL");
});
document.getElementById("btnBuscarManual").addEventListener("click", manualSearch);
document.getElementById("btnLimpiar").addEventListener("click", resetAll);
document.getElementById("btnVolver").addEventListener("click", goBack);

loadCSV().then(rows => { manualRows = rows; });
</script>
